<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex,nofollow" />
    <!-- Inline boş favicon — browser'ın /favicon.ico için yaptığı 404 isteğini
         susturur. Sprint 0.8 civarı gerçek ikon eklenecek. -->
    <link rel="icon" href="data:," />
    <title>VoltXAmpere v2 · Sprint 0.3</title>

    <!-- Geist (sans) + JetBrains Mono (mono) + Instrument Serif (marka logosu).
         Sprint 0.8: Instrument Serif eklendi; logo dışında kullanılmaz. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"

    <!-- Tasarım tokenleri `src/main.ts` üzerinden import ediliyor (Vite bundle). -->
    <style>

         Token değişkenleri (:root) main.ts -> tokens.css ile yükleniyor. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: #07080A;
        color: #E8EAED;
        font-family: 'Geist', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Sprint 0.1 kanıt sayfası: tek Lit custom element. -->
